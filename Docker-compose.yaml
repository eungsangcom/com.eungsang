# docker-compose (맥미니 · NAS · 로컬)
#
# 기본: bind mount 없음 — 이미지 빌드(COPY) 코드만 사용.
#   Synology Drive 등 클라우드 동기화 경로를 마운트하면 macOS Errno 35 로 기동 실패.
#   맥미니 프로덕션(권장): 맥북에서 ./scripts/docker/deploy-backend-to-macmini.sh
#     — 맥미니 git pull / compose --build 없음 · docker save|load 로 이미지만 반영
#   Hub pull(대안): docker compose -f Docker-compose.yaml -f docker-compose.hub.yaml pull && up -d
#
# 구성
#   - backend (FastAPI 8000)  ← 맥미니 Docker
#   - frontend (Next.js 3000) ← 프로필 local-frontend (프로덕션은 Vercel)
#   - cloudflared             ← Vercel BACKEND_URL 노출
#   - n8n · redis · neo4j · ontology-mcp · code-rag · novel-rag · books-rag · moderation-api (DB: NAS pgvector 192.168.0.72:5433)
#
# 사용 예:
#   docker compose up -d                          # 맥미니·NAS 스택
#   docker compose --profile local-frontend up -d # 로컬 Next.js dev 컨테이너 포함
#
# 루트 .env (cp .env.example .env):
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
#   NEO4J_PASSWORD=...
#   CLOUDFLARE_TUNNEL_TOKEN=...
#   UPLOADS_HOST_PATH=/Volumes/project/eungsang.com/upload  (맥미니 NAS 마운트 rw, 미설정 시 ./eungsang/apps/uploads)
#   BGM_HOST_PATH=/Volumes/project/eungsang.com  (NAS 루트 rw — bgm·intro·crawscrape 등)
#   NAS_PHOTO_HOST_PATH=/Volumes/photo  (갤러리 사진 NAS rw)

services:

  # ── FastAPI 백엔드 (8000포트) ─────────────
  backend:
    build: ./eungsang
    image: comeungsang-backend:latest
    container_name: eungsang-api
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "8000:8000"
    env_file:
      - ./eungsang/.env
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s
    environment:
      DB_STARTUP_TIMEOUT_SEC: "180"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-eungsang}:${POSTGRES_PASSWORD:-eung}@${POSTGRES_HOST:-192.168.0.72}:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-eungsang_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      RELAY_SPAM_LEARN_INGEST: "true"
      N8N_FAKER_EMAIL_WEBHOOK_URL: http://n8n:5678/webhook/relay/faker-email
      OLLAMA_HOST: http://100.102.174.81:11434
      OLLAMA_CHAT_MODEL: exaone3.5:7.8b-instruct-q4_K_M
      FAKER_ORCHESTRATOR_MODEL: exaone3.5:7.8b-instruct-q4_K_M
      HOLOGRAM_ORCHESTRATOR_MODEL: exaone3.5:7.8b-instruct-q4_K_M
      HUB_DISPATCH_MODEL: exaone3.5:7.8b-instruct-q4_K_M
      ONTOLOGY_MCP_URL: http://ontology-mcp:8421
      CODE_RAG_URL: http://code-rag:8422
      NOVEL_RAG_URL: http://novel-rag:8423
      BOOKS_RAG_URL: http://books-rag:8424
      WINDOWS_METRICS_URL: ${WINDOWS_METRICS_URL:-http://100.102.174.81:8425/metrics}
      ARTIMUSE_URL: ${ARTIMUSE_URL:-}
      ARTIMUSE_TIMEOUT_SEC: ${ARTIMUSE_TIMEOUT_SEC:-120}
      STAR_CRAFT_CRAWLED_DIR: /Volumes/project/eungsang.com/crawscrape
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      n8n:
        condition: service_started
    restart: on-failure:5
    volumes:
      - ${UPLOADS_HOST_PATH:-./eungsang/apps/uploads}:/app/apps/uploads
      - ${NAS_PHOTO_HOST_PATH:-/Volumes/photo}:/Volumes/photo
      - ${BGM_HOST_PATH:-/Volumes/project/eungsang.com}:/Volumes/project/eungsang.com
    networks:
      - app-network

  # ── Next.js 프론트엔드 (3000포트 · 로컬 dev) ─
  frontend:
    profiles: ["local-frontend"]
    build:
      context: ./jebbi
      dockerfile: Dockerfile
    container_name: eungsang-web
    ports:
      - "3000:3000"
    volumes:
      - ./jebbi:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DOCKER_CONTAINER=1
      - BACKEND_URL=https://api.eungsang.com
    env_file:
      - path: ./jebbi/.env.local
        required: false
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ── Redis (6379 · AOF 영속화) ───────────────
  redis:
    image: redis:7-alpine
    container_name: eungsang-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

  # ── Neo4j 그래프 DB (7474 Browser · 7687 Bolt) ─
  neo4j:
    image: neo4j:5-community
    container_name: eungsang-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    networks:
      - app-network

  # ── Ontology MCP (8421 · Neo4j + pgvector + Windows embed) ─
  ontology-mcp:
    build: ./ontology_mcp
    container_name: eungsang-ontology-mcp
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8421"]
    ports:
      - "8421:8421"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      DB_DSN: postgresql://eungsang:eung@192.168.0.72:5433/eungsang_DB
      EMBED_URL: http://100.102.174.81:8420/embed
    depends_on:
      neo4j:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # ── Code RAG (8422 · PDF 임베딩 + pgvector + qwen2.5-coder) ─
  code-rag:
    build: ./rag_code
    container_name: eungsang-code-rag
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8422"]
    ports:
      - "8422:8422"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_DSN: postgresql://eungsang:eung@192.168.0.72:5433/eungsang_DB
      EMBED_URL: http://100.102.174.81:8420/embed
      EMBED_MODEL: kure
      OLLAMA_HOST: http://100.102.174.81:11434
      CODE_MODEL: qwen2.5-coder:14b
    restart: unless-stopped
    networks:
      - app-network

  # ── Novel RAG (8423 · 소설 로어·본문 + pgvector + qwen2.5) ─
  novel-rag:
    build: ./rag_novel
    container_name: eungsang-novel-rag
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8423"]
    ports:
      - "8423:8423"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_DSN: postgresql://eungsang:eung@192.168.0.72:5433/eungsang_DB
      EMBED_URL: http://100.102.174.81:8420/embed
      EMBED_MODEL: kure
      OLLAMA_HOST: http://100.102.174.81:11434
      NOVEL_MODEL: qwen2.5:14b
    restart: unless-stopped
    networks:
      - app-network

  # ── Books RAG (8424 · 도서 PDF + pgvector + qwen2.5) ─
  books-rag:
    build: ./rag_books
    container_name: eungsang-books-rag
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8424"]
    ports:
      - "8424:8424"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_DSN: postgresql://eungsang:eung@192.168.0.72:5433/eungsang_DB
      EMBED_URL: http://100.102.174.81:8420/embed
      EMBED_MODEL: kure
      OLLAMA_HOST: http://100.102.174.81:11434
      BOOKS_MODEL: qwen2.5:14b
    restart: unless-stopped
    networks:
      - app-network

  # ── n8n 워크플로 자동화 (5678포트) ─────────
  # relay 워크플로는 이미지 빌드 시 COPY (docker/n8n/Dockerfile)
  n8n:
    build: ./docker/n8n
    image: eungsang-n8n:local
    container_name: eungsang-n8n
    ports:
      - "5678:5678"
    entrypoint: ["/docker-entrypoint.sh"]
    environment:
      - N8N_HOST=n8n.eungsang.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.eungsang.com/
      - N8N_EDITOR_BASE_URL=https://n8n.eungsang.com/
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - ONTOMCP_HOST=ontology-mcp
      - ONTOMCP_PORT=8421
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - app-network

  # ── Moderation API (8010→8000 · 콘텐츠 검수) ─
  moderation-api:
    build:
      context: ./eungsang
      dockerfile: apps/moderation_service/Dockerfile
    container_name: eungsang-moderation-api
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ── Cloudflare Tunnel (외부 → tunnel-origin → backend) ─
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ./eungsang/.env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  n8n_data:
  redis_data:
  neo4j_data:

# 공유 네트워크는 compose가 재생성하지 않음.
# (IPAM/subnet 불일치 시 `up --force-recreate backend` 가 네트워크 삭제에 실패하던 문제 방지)
# 최초 1회: docker network create comeungsang_app-network
# 배포 스크립트가 없으면 자동 생성함.
networks:
  app-network:
    name: comeungsang_app-network
    external: true
